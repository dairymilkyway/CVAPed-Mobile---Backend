version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_APP_ENTRY: ${NODE_APP_ENTRY}
    ports:
      - "8080:8080"
    depends_on:
      - mongo

volumes:
  mongo_data:
