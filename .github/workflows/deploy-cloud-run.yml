name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: your-gcp-project-id
  REGION: us-central1
  SERVICE: cvacare-backend
  WORKDIR: backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry exists
        run: |
          gcloud artifacts repositories describe backend-images \
            --location=${{ env.REGION }} >/dev/null 2>&1 || \
          gcloud artifacts repositories create backend-images \
            --repository-format=docker \
            --location=${{ env.REGION }}

      - name: Build image
        run: |
          gcloud builds submit ./${{ env.WORKDIR }} \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/backend-images/${{ env.SERVICE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/backend-images/${{ env.SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 2Gi \
            --cpu 1 \
            --timeout 300 \
            --max-instances 3 \
            --set-env-vars NODE_ENV=production,FLASK_ENV=production,USE_GLOBAL_PYTHON=true,PORT=8080,GAIT_ANALYSIS_PORT=5001,THERAPY_PORT=5002,CORS_ORIGINS=${{ secrets.CORS_ORIGINS }},MONGODB_URI=${{ secrets.MONGODB_URI }},DB_NAME=${{ secrets.DB_NAME }},JWT_SECRET=${{ secrets.JWT_SECRET }},SECRET_KEY=${{ secrets.JWT_SECRET }},GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }},CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }},CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }},AZURE_SPEECH_KEY=${{ secrets.AZURE_SPEECH_KEY }},AZURE_SPEECH_REGION=${{ secrets.AZURE_SPEECH_REGION }},FIREBASE_SERVICE_ACCOUNT_JSON_BASE64=${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}

      - name: Smoke test
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE }} --region ${{ env.REGION }} --format='value(status.url)')
          curl --fail "$SERVICE_URL/healthz"
          curl --fail "$SERVICE_URL/readyz"
