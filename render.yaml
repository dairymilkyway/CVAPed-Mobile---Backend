services:
  - type: web
    name: cvacare-backend
    runtime: docker
    repo: https://github.com/REPLACE_WITH_YOUR_USERNAME/REPLACE_WITH_YOUR_REPO.git
    plan: starter
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: FLASK_ENV
        value: production
      - key: USE_GLOBAL_PYTHON
        value: "true"
      - key: PORT
        value: "8080"
      - key: GAIT_ANALYSIS_PORT
        value: "5001"
      - key: THERAPY_PORT
        value: "5002"
      - key: DB_NAME
        value: CVACare
      - key: JWT_SECRET
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON_BASE64
        sync: false
